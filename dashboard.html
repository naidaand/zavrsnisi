<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <h2 class="title">Rezervacije</h2>

  <select id="service">
    <option value="Šišanje">Šišanje</option>
    <option value="Feniranje">Feniranje</option>
    <option value="Farbanje">Farbanje</option>
  </select>

  <input type="date" id="date">
  <input type="time" id="time">

  <button onclick="addReservation()">Rezerviši</button>

  <h3>Lista rezervacija</h3>
  <ul id="list"></ul>

  <button onclick="logout()">Logout</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/reservations.js"></script>

</body>
</html>
